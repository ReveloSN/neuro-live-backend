spring.datasource.url=jdbc:h2:mem:neurolive-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=false
jwt.secret=test-secret-key-that-is-long-enough-for-tests
jwt.expiration=86400000
telemetry.disconnect-timeout-seconds=5
telemetry.disconnect-check-interval-seconds=60
telemetry.expected-interval-seconds=1
telemetry.disconnect-grace-periods=1

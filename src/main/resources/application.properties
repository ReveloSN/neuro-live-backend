spring.application.name=neuro-live-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/neurolive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:neurolive-secret-key-2026-super-secure-12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

management.endpoints.web.exposure.include=health
server.port=${PORT:8080}

mqtt.broker-uri=${MQTT_BROKER_URI:tcp://localhost:1883}
mqtt.client-id=${MQTT_CLIENT_ID:neuro-live-backend}
mqtt.username=${MQTT_USERNAME:}
mqtt.password=${MQTT_PASSWORD:}
mqtt.default-qos=${MQTT_DEFAULT_QOS:1}
mqtt.secure=${MQTT_SECURE:false}
mqtt.auto-startup=${MQTT_AUTO_STARTUP:true}
mqtt.telemetry-topic=${MQTT_TELEMETRY_TOPIC:neurolive/telemetry}
mqtt.telemetry-qos=${MQTT_TELEMETRY_QOS:1}
mqtt.command-topic-template=${MQTT_COMMAND_TOPIC_TEMPLATE:neurolive/devices/%s/commands}

telemetry.disconnect-timeout-seconds=${TELEMETRY_DISCONNECT_TIMEOUT_SECONDS:10}
telemetry.disconnect-check-interval-seconds=${TELEMETRY_DISCONNECT_CHECK_INTERVAL_SECONDS:3}

spring.application.name=neuro-live-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/neurolive}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:neurolive-secret-key-2026-super-secure-12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

account-recovery.token-expiration-minutes=${ACCOUNT_RECOVERY_TOKEN_EXPIRATION_MINUTES:15}
account-recovery.request-cooldown-seconds=${ACCOUNT_RECOVERY_REQUEST_COOLDOWN_SECONDS:60}
account-recovery.mail.mode=${ACCOUNT_RECOVERY_MAIL_MODE:logging}
account-recovery.mail.from=${ACCOUNT_RECOVERY_MAIL_FROM:${SPRING_MAIL_USERNAME:no-reply@neurolive.local}}
account-recovery.mail.subject=${ACCOUNT_RECOVERY_MAIL_SUBJECT:Codigo de recuperacion NeuroLive}
account-recovery.mail.application-name=${ACCOUNT_RECOVERY_MAIL_APPLICATION_NAME:NeuroLive}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}

management.endpoints.web.exposure.include=health
server.port=${PORT:8080}
internal.token=${INTERNAL_TOKEN:ws-internal-secret-change-in-prod}
realtime.service.base-url=${REALTIME_SERVICE_URL:http://localhost:8080}

telemetry.disconnect-timeout-seconds=${TELEMETRY_DISCONNECT_TIMEOUT_SECONDS:10}
telemetry.disconnect-check-interval-seconds=${TELEMETRY_DISCONNECT_CHECK_INTERVAL_SECONDS:3}
telemetry.expected-interval-seconds=${TELEMETRY_EXPECTED_INTERVAL_SECONDS:3}
telemetry.disconnect-grace-periods=${TELEMETRY_DISCONNECT_GRACE_PERIODS:3}
analysis.baseline-window-minutes=${ANALYSIS_BASELINE_WINDOW_MINUTES:5}
analysis.trie-window-size=${ANALYSIS_TRIE_WINDOW_SIZE:8}
links.token-expiration-minutes=${LINKS_TOKEN_EXPIRATION_MINUTES:15}

app.allowed-origins=${APP_ALLOWED_ORIGINS:${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://neuro-live-frontend.vercel.app}}
